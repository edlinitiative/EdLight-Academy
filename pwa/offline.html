<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Hors ligne · EdLight Academy</title>
  <meta name="theme-color" content="#0A66C2">
  <style>
    :root { color-scheme: light dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
      color: #1a1a1a;
      background:
        radial-gradient(circle at 15% 18%, rgba(10, 102, 194, 0.06) 0%, transparent 42%),
        #faf9f7;
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
    }
    .card {
      max-width: 28rem;
      width: 100%;
      text-align: center;
      background: #ffffff;
      border: 1px solid #e5e3df;
      border-radius: 16px;
      box-shadow: 0 16px 40px -8px rgba(15, 15, 15, 0.14);
      padding: 2.5rem 2rem;
    }
    .icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      background: #E8F1FB;
      color: #0A66C2;
    }
    h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { color: #5d5b54; font-size: 0.9rem; margin-bottom: 0.4rem; }
    .hint { color: #787671; font-size: 0.8rem; margin-top: 0.75rem; }
    button {
      margin-top: 1.5rem;
      font: inherit;
      font-weight: 600;
      font-size: 0.85rem;
      color: #fff;
      background: linear-gradient(135deg, #0857A6, #1e88e5);
      border: none;
      border-radius: 999px;
      padding: 0.65rem 1.4rem;
      cursor: pointer;
    }
    @media (prefers-color-scheme: dark) {
      body { color: #f3f1ec; background: #232322; }
      .card { background: #2c2b2a; border-color: #3a3936; }
      p { color: #bbb8b1; }
      .hint { color: #a4a097; }
    }
  </style>
</head>
<body>
  <main class="card" role="alert">
    <div class="icon" aria-hidden="true">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.58 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>
    <h1>Vous êtes hors ligne</h1>
    <p>Impossible de joindre EdLight Academy pour le moment.</p>
    <p>Les cours et examens que vous avez déjà ouverts restent disponibles.</p>
    <p class="hint">Reconnectez-vous, puis réessayez.</p>
    <button type="button" onclick="location.reload()">Réessayer</button>
  </main>
</body>
</html>
