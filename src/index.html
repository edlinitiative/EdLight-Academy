<body>
  <!--
    Static, crawlable fallback content. React (createRoot) replaces #root on
    mount, so real users see the full app; search engines, the Google Ads
    landing-page crawler, and link-preview bots (WhatsApp/Facebook) that don't
    run JS still get meaningful HTML and internal links on the first response.
    Inline styles keep it presentable before the CSS bundle loads.
  -->
  <div id="root">
    <div style="max-width:720px;margin:0 auto;padding:48px 20px;font-family:Inter,system-ui,-apple-system,sans-serif;color:#232322;text-align:center">

        Vidéos courtes, quiz interactifs et examens blancs du Baccalauréat —
        gratuit, en français et en créole haïtien (Kreyòl).
      </p>
