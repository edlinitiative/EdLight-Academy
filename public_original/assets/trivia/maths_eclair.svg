<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <radialGradient id="gl" cx="0.8" cy="0.18" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse">
      <path d="M26 0H0V26" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.07"/>
    </pattern>
  </defs>
  <rect width="400" height="225" fill="url(#bg)"/>
  <rect width="400" height="225" fill="url(#grid)"/>
  <rect width="400" height="225" fill="url(#gl)"/>
  <!-- lightning bolt (éclair) -->
  <polygon points="214,34 150,120 190,120 176,192 252,96 206,96" fill="#fde047" opacity="0.96"/>
  <!-- math operators -->
  <g fill="#bfdbfe" font-family="Georgia, 'Times New Roman', serif" font-weight="700" opacity="0.9">
    <text x="56" y="86" font-size="46">π</text>
    <text x="60" y="174" font-size="46">√</text>
    <text x="300" y="86" font-size="44">∑</text>
    <text x="306" y="176" font-size="46">×</text>
  </g>
</svg>
