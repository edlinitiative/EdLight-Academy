<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16a34a"/>
      <stop offset="1" stop-color="#14532d"/>
    </linearGradient>
    <radialGradient id="gl" cx="0.78" cy="0.2" r="0.85">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.4" fill="#ffffff" opacity="0.07"/>
    </pattern>
  </defs>
  <rect width="400" height="225" fill="url(#bg)"/>
  <rect width="400" height="225" fill="url(#dots)"/>
  <rect width="400" height="225" fill="url(#gl)"/>
  <!-- DNA double helix -->
  <g stroke="#ffffff" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.96">
    <path d="M200 38 C 250 56, 250 92, 200 112 C 150 132, 150 168, 200 188"/>
    <path d="M200 38 C 150 56, 150 92, 200 112 C 250 132, 250 168, 200 188"/>
  </g>
  <!-- base-pair rungs -->
  <g stroke="#bbf7d0" stroke-width="5" stroke-linecap="round" opacity="0.9">
    <line x1="171" y1="64" x2="229" y2="64"/>
    <line x1="179" y1="89" x2="221" y2="89"/>
    <line x1="179" y1="135" x2="221" y2="135"/>
    <line x1="171" y1="160" x2="229" y2="160"/>
  </g>
</svg>
