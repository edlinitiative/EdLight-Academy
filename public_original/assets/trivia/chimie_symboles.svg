<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0891b2"/>
      <stop offset="1" stop-color="#0c4a6e"/>
    </linearGradient>
    <radialGradient id="gl" cx="0.78" cy="0.2" r="0.85">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.4" fill="#ffffff" opacity="0.07"/>
    </pattern>
  </defs>
  <rect width="400" height="225" fill="url(#bg)"/>
  <rect width="400" height="225" fill="url(#dots)"/>
  <rect width="400" height="225" fill="url(#gl)"/>
  <!-- atom -->
  <g fill="none" stroke="#ffffff" stroke-width="5" opacity="0.95">
    <ellipse cx="158" cy="112" rx="68" ry="26"/>
    <ellipse cx="158" cy="112" rx="68" ry="26" transform="rotate(60 158 112)"/>
    <ellipse cx="158" cy="112" rx="68" ry="26" transform="rotate(120 158 112)"/>
  </g>
  <circle cx="158" cy="112" r="13" fill="#ffffff"/>
  <g fill="#67e8f9">
    <circle cx="226" cy="112" r="6"/>
    <circle cx="124" cy="55" r="6"/>
    <circle cx="124" cy="169" r="6"/>
  </g>
  <!-- element symbols -->
  <g fill="#ffffff" font-family="Georgia, 'Times New Roman', serif" font-weight="700" opacity="0.96">
    <text x="250" y="92" font-size="40">Na</text>
    <text x="262" y="158" font-size="36">O₂</text>
  </g>
</svg>
